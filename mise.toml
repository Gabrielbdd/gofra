[tools]
go = "1.25"
python = "3.12"

[tasks.test]
description = "Run the framework test suite"
run = "env GOCACHE=${GOCACHE:-/tmp/gofra-gocache} go test ./..."

[tasks.gofra]
description = "Show the current gofra CLI help"
run = "env GOCACHE=${GOCACHE:-/tmp/gofra-gocache} go run ./cmd/gofra --help"

[tasks."gen:config"]
description = "Show the config generator help"
run = "env GOCACHE=${GOCACHE:-/tmp/gofra-gocache} go run ./cmd/gofra generate config -h"

[tasks.new]
description = "Create a new app from the canonical starter"
run = "env GOCACHE=${GOCACHE:-/tmp/gofra-gocache} go run ./cmd/gofra new {{arg(i=0)}}"

[tasks."new:module"]
description = "Create a new app from the canonical starter with an explicit Go module path"
run = "env GOCACHE=${GOCACHE:-/tmp/gofra-gocache} go run ./cmd/gofra new --module {{arg(i=1)}} {{arg(i=0)}}"

[tasks."docs:guard"]
description = "Check that public-surface changes include docs/framework/ updates"
run = "bash scripts/claude/check-docs-stop.sh --ci"

[tasks."docs:deps"]
description = "Install Python dependencies required to build the public docs site"
run = "pip install --quiet --disable-pip-version-check -r docs-requirements.txt"

[tasks."docs:build"]
description = "Build the public documentation site in strict mode"
depends = ["docs:deps"]
run = "mkdocs build --strict"

[tasks."docs:serve"]
description = "Serve the public documentation site locally with live reload"
depends = ["docs:deps"]
run = "mkdocs serve"

[tasks."smoke:frontend"]
description = "Generate a temporary app and verify the frontend toolchain builds"
run = '''
set -eu
framework="$(pwd)"
tmpdir="$(mktemp -d "${TMPDIR:-/tmp}/gofra-smoke-fe-XXXXXX")"
env GOCACHE="${GOCACHE:-/tmp/gofra-gocache}" go run ./cmd/gofra new "$tmpdir"
(
  cd "$tmpdir"
  env GOWORK=off GOFLAGS=-mod=mod go mod edit -replace "github.com/Gabrielbdd/gofra=$framework"
  env GOWORK=off GOFLAGS=-mod=mod GOCACHE="${GOCACHE:-/tmp/gofra-gocache}" go mod tidy
  mise trust --yes
  mise run generate
  cd web
  npm install --no-audit --no-fund --ignore-scripts
  npm run build
)
printf 'generated frontend verified at %s\n' "$tmpdir"
'''

[tasks."smoke:new"]
description = "Generate a temporary app from the starter and verify it with go test"
run = '''
set -eu
framework="$(pwd)"
tmpdir="$(mktemp -d "${TMPDIR:-/tmp}/gofra-smoke-XXXXXX")"
env GOCACHE="${GOCACHE:-/tmp/gofra-gocache}" go run ./cmd/gofra new "$tmpdir"
(
  cd "$tmpdir"
  # Point the generated app at this workspace's in-tree framework so smoke
  # exercises unreleased changes (new CLI flags, new runtime packages) that
  # the published module version does not yet include.
  env GOWORK=off GOFLAGS=-mod=mod go mod edit -replace "github.com/Gabrielbdd/gofra=$framework"
  env GOWORK=off GOFLAGS=-mod=mod GOCACHE="${GOCACHE:-/tmp/gofra-gocache}" go mod tidy
  mise trust --yes
  mise run generate
  env GOWORK=off GOFLAGS=-mod=mod GOCACHE="${GOCACHE:-/tmp/gofra-gocache}" go test ./...
)
printf 'generated app verified at %s\n' "$tmpdir"
'''
