<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gofra Basic Example</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        color: #0f172a;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2.4rem;
      }

      p {
        max-width: 60ch;
        line-height: 1.6;
      }

      pre {
        overflow: auto;
        padding: 20px;
        border-radius: 16px;
        background: #0f172a;
        color: #e2e8f0;
      }
    </style>
    <script src="/_gofra/config.js"></script>
  </head>
  <body>
    <main>
      <h1>Gofra Runtime Config Scaffold</h1>
      <p>
        This example app proves the first vertical slice: the Go server emits a
        browser-safe runtime config at <code>/_gofra/config.js</code>, and the
        frontend can consume the same contract.
      </p>
      <pre id="runtime-config"></pre>
    </main>
    <script>
      const target = document.getElementById("runtime-config");
      target.textContent = JSON.stringify(window.__GOFRA_CONFIG__ ?? null, null, 2);
    </script>
  </body>
</html>
