syntax = "proto3";

package testapp.config.v1;

import "gofra/config/v1/annotations.proto";

message Config {
  AppConfig app = 1;
  PublicConfig public = 2;
}

message AppConfig {
  int32 port = 1;
}

message PublicConfig {
  // This should be rejected: secret field under the public subtree.
  string api_key = 1 [(gofra.config.v1.field).secret = true];
}
